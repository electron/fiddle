# Called during ci and release
name: Test

on:
  workflow_call:

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15-intel
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          - os: macos-latest
            arch: arm64
          - os: ubuntu-24.04-arm
            arch: armv7l
    runs-on: '${{ matrix.os }}'
    steps:
      - run: git config --global core.autocrlf input
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Use D:\\ drive for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p /d/fast-temp
          echo "YARN_GLOBAL_FOLDER=D:\\yarn-data" >> $GITHUB_ENV
          echo "TEMP=D:\\fast-temp" >> $GITHUB_ENV
      - name: Install dependencies
        run: yarn --immutable
      - run: yarn run contributors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: yarn run electron-releases
      - name: Lint and format
        run: yarn run lint && yarn run format
      - name: Test
        run: yarn tsc && yarn test:ci
